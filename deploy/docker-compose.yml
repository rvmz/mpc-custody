services:
  custody-api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: :8080
      ENVIRONMENT: compose
      BROADCAST_MODE: mock
      DATABASE_URL: postgres://custody:custody@postgres:5432/custody?sslmode=disable
      EVM_RPC_URL: http://anvil:8545
      EVM_CHAIN_ID: 31337
      EVM_DEV_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_started

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: anvil
    command:
      - --host
      - 0.0.0.0
      - --chain-id
      - "31337"
    ports:
      - "8545:8545"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: custody
      POSTGRES_USER: custody
      POSTGRES_PASSWORD: custody
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custody -d custody"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  postgres-data:
