services:
  custody-api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: :8080
      ENVIRONMENT: compose
      BROADCAST_MODE: mock
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
