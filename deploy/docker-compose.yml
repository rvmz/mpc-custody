services:
  custody-api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: :8080
      ENVIRONMENT: compose
      BROADCAST_MODE: mock
      DATABASE_URL: postgres://custody:custody@postgres:5432/custody?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: custody
      POSTGRES_USER: custody
      POSTGRES_PASSWORD: custody
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custody -d custody"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  postgres-data:
